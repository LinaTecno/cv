experiences:
    title: Experiencia
    info:

      - role: Communication & Content Strategist (Freelance)
        time: 2023 - Actualidad
        company: <b>Proyectos independientes LATAM</b>
        details: |
            - Gestión simultánea de múltiples proyectos, definiendo prioridades, entregables y flujos de trabajo.
            - Desarrollo de estrategias de comunicación y contenido alineadas con objetivos organizacionales.
            - Trabajo en iniciativas de impacto social y territorial, estructurando procesos de comunicación desde etapas tempranas.
            - Acompañamiento en organización de información y construcción de narrativas para visibilidad y sostenibilidad de proyectos.

      - role: Jefe de Mercadeo y Comunicaciones
        time: 2018 - 2023
        company: <b>Grupo Sitt y Cía</b>, Bogotá (CO)
        details: |
          - Lideré la estructuración y gestión del área de Mercadeo y Comunicaciones para múltiples unidades de negocio.
          - Coordiné proyectos simultáneos, definiendo prioridades, cronogramas y entregables entre equipos.
          - Implementé seguimiento de métricas (tráfico, engagement, conversión), utilizando datos para evaluar desempeño y optimizar estrategias.
          - Desarrollé prácticas de reporting para mejorar la visibilidad de resultados y apoyar la toma de decisiones.
          - Coordiné equipos multidisciplinarios asegurando alineación entre objetivos estratégicos y ejecución.
          - Traducí información técnica y normativa en contenidos estructurados y herramientas de comunicación interna.
          - Fortalecí procesos internos, mejorando la coordinación y participación entre áreas.

      - role: Coordinadora de Comunicación y Contenidos (Freelancer)
        time: 2019 - 2023
        company: <b>REEVO</b>, ONG internacional
        details: |
          - Coordiné procesos de comunicación entre equipos y comunidades en distintos países.
          - Apoyé estrategias de posicionamiento y sostenibilidad mediante campañas de membresía y donaciones.
          - Organicé contenidos, flujos de información y planificación editorial para mejorar la consistencia comunicacional.

      - role: Business & Inbound Marketing Lead 
        time: 2017 - 2018
        company: <b>Contento / Multiplica</b>
        details: |
          - Diseñé e implementé estrategias de inbound marketing basadas en datos.
          - Monitoreé KPIs de adquisición, conversión y engagement para optimizar resultados.
          - Construí reportes de desempeño para seguimiento y toma de decisiones.
          - Coordiné equipos multidisciplinarios alineando estrategia, ejecución y resultados.

      - role: Senior Account Executive – Marketing & Communications
        time: 2016 - 2017
        company: <b>Barbara & Frick</b>
        details: |
          - Gestioné proyectos de comunicación integrada coordinando equipos de estrategia, creatividad, medios y producción.
          - Administré cronogramas, entregables y relación con clientes.
          - Aseguré coherencia entre estrategia y ejecución en múltiples campañas simultáneas.

      - role: Innovation & Digital Experience Consultant
        time: 2016
        company: <b>Igloo Lab</b>
        details: |
          - Coordiné proyectos de experiencias digitales desde la conceptualización hasta la ejecución.
          - Gestioné tiempos, entregables y relación con stakeholders.
          - Diseñé experiencias alineadas con objetivos de comunicación y engagement.

      - role: Social Media & Digital Content Lead
        time: 2014-2016
        company: <b>LEGIS Editores</b>
        details: |
          - Lideré la estrategia de contenidos y redes sociales con enfoque en desempeño.
          - Monitoreé métricas y comportamiento de usuarios para optimizar resultados.
          - Planifiqué y ejecuté contenido alineado con objetivos comerciales.
          - Apoyé la optimización de plataformas digitales y e-commerce.

