career-profile:
    title: Perfil profesional
    summary: |
        ¡Hola!, soy Lina. Profesional en comunicación y marketing con más de 15 años de experiencia liderando proyectos, coordinando equipos multidisciplinarios y gestionando estrategias digitales y de contenido en América Latina.

        A lo largo de mi trayectoria he trabajado de manera cercana con métricas, análisis de desempeño y reporting, utilizando datos para evaluar resultados, optimizar estrategias y apoyar la toma de decisiones en diferentes áreas de negocio.

        Me destaco por estructurar procesos, organizar flujos de trabajo complejos y gestionar múltiples prioridades, asegurando consistencia, cumplimiento y alineación entre equipos, objetivos y ejecución. En los últimos años he enfocado mi trabajo en proyectos con impacto social y territorial, conectando comunicación, operación y propósito.

