career-profile:
    title: Professional Profile
    summary: |
        Hi, I’m Lina. I’m a communications and marketing professional with 10+ years of experience leading projects, coordinating cross-functional teams, and managing digital and content strategies across Latin America.

        Throughout my career, I have worked closely with performance metrics, reporting, and data analysis, using data to evaluate results, optimize strategies, and support decision-making across different initiatives.

        I am particularly strong in structuring processes, organizing complex workflows, and managing multiple priorities, ensuring consistency, accuracy, and alignment between strategy and execution. In recent years, I have focused on projects with social and territorial impact, connecting communication, operations, and purpose.

