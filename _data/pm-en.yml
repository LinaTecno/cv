experiences:
    title: Experience
    info:

      - role: Communication & Content Strategist (Freelance)
        time: 2023 - Present
        company: <b>Independent Projects LATAM</b>
        details: |
            - Manage multiple projects simultaneously, defining priorities, deliverables, and workflows.
            - Develop communication and content strategies aligned with organizational goals.
            - Work on social and territorial impact initiatives, structuring communication processes from early stages.
            - Support organizations in organizing information and building narratives for visibility and sustainability.

      - role: Head of Marketing & Communications
        time: 2018 - 2023
        company: <b>Grupo Sitt & Cía</b>, Bogotá (Colombia)
        details: |
          - Led the structuring and management of the Marketing & Communications area across multiple business units.
          - Coordinated multiple concurrent projects, managing timelines, priorities, and deliverables.
          - Monitored performance metrics (traffic, engagement, conversion), using data to evaluate effectiveness and optimize strategies.
          - Developed reporting practices to improve visibility and support decision-making.
          - Coordinated cross-functional teams, ensuring alignment between strategy and execution.
          - Translated complex technical and regulatory information into clear and structured formats.
          - Strengthened internal processes, improving coordination and team alignment.

      - role: Communications & Content Coordinator (Freelance)
        time: 2019 - 2023
        company: <b>REEVO</b>, International NGO
        details: |
          - Coordinated communication processes across distributed teams and communities.
          - Supported positioning and sustainability strategies through membership and donation campaigns.
          - Organized content and workflows to improve consistency and clarity across channels.

      - role: Business & Inbound Marketing Lead
        time: 2017 - 2018
        company: <b>Contento / Multiplica</b>
        details: |
          - Designed and implemented inbound marketing strategies supported by data.
          - Tracked KPIs (acquisition, conversion, engagement) to evaluate and improve performance.
          - Built reporting structures to support monitoring and decision-making.
          - Coordinated multidisciplinary teams aligning strategy, execution, and results.

      - role: Senior Account Executive – Marketing & Communications
        time: 2016 - 2017
        company: <b>Barbara & Frick</b>
        details: |
          - Managed integrated communication projects across digital, ATL, and BTL channels.
          - Coordinated cross-functional teams (strategy, creative, media, production).
          - Managed timelines, deliverables, and client relationships.
          - Ensured consistency between strategic direction and execution.

      - role: Innovation & Digital Experience Consultant
        time: 2016
        company: <b>Igloo Lab</b>
        details: |
          - Led digital experience projects from concept to execution.
          - Managed timelines, deliverables, and stakeholder relationships.
          - Designed engagement-driven experiences aligned with communication goals.

      - role: Social Media & Digital Content Lead
        time: 2014 - 2016
        company: <b>LEGIS Editores</b>
        details: |
          - Led content and social media strategy with a focus on performance.
          - Monitored metrics and user behavior to optimize results.
          - Planned and executed content aligned with business objectives.
          - Supported website and e-commerce optimization.

